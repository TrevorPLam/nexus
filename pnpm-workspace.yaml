packages:
  - 'packages/*'
  - 'apps/*'

# Allow builds for specific packages
allowBuilds:
  esbuild: true
  lefthook: true
  sharp: true
  supabase: true
  unrs-resolver: true

# Catalog for shared dependency versions (pnpm 9.5+)
# Strict mode enforces catalog usage across all packages
catalogMode: strict

catalogs:
  default:
    '@dnd-kit/core': ^6.3.1
    '@dnd-kit/sortable': ^10.0.0
    '@dnd-kit/utilities': ^3.2.2
    '@eslint/js': ^10.0.1
    '@hono/swagger-ui': ^0.6.1
    '@tanstack/react-query': ^5.0.0
    '@vitejs/plugin-react': ^4.3.0
    '@vitest/coverage-v8': 2.1.9
    autoprefixer: ^10.5.4
    drizzle-orm: ^0.45.0
    eslint-import-resolver-typescript: ^3.6.0
    hono: ^4.12.0
    lucide-react: ^1.25.0
    postcss: ^8.5.21
    prettier: ^3.9.6
    react: ^18.3.0
    react-dom: ^18.3.0
    rrule: ^2.8.1
    tailwindcss: ^4.3.3
    typescript: ^5.9.0
    vitest: ^2.1.0
    zod: ^4.0.0

# Workspace settings
# linkWorkspacePackages: false enforces workspace: protocol usage
linkWorkspacePackages: false

# Hoisting settings for tooling compatibility
# These settings moved from .npmrc per pnpm best practices (PR #11189)
publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '*typescript*'
  - '*lefthook*'
