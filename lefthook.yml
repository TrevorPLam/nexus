pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{js,jsx,ts,tsx,json,md,yaml,yml}'
      run: pnpm format
      stage_fixed: true
    lint:
      glob: '*.{js,jsx,ts,tsx}'
      run: pnpm lint

pre-push:
  commands:
    test:
      run: pnpm test

commit-msg:
  commands:
    lint-commit:
      run: pnpm dlx commitlint --edit {1}
